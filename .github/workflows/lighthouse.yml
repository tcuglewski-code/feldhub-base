# Lighthouse CI — Performance Benchmarks
# Läuft auf PRs gegen main + nach Deploy-Preview
# Prüft Core Web Vitals: LCP <2.5s, CLS <0.1, Lighthouse Score >85

name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  deployment_status:

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: 🔦 Performance Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel Preview
        if: github.event_name == 'pull_request'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel-preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10

      - name: Get Deployment URL
        id: deployment-url
        run: |
          if [[ "${{ github.event_name }}" == "deployment_status" ]]; then
            echo "url=${{ github.event.deployment_status.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ steps.vercel-preview.outputs.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        id: lighthouse
        with:
          urls: |
            ${{ steps.deployment-url.outputs.url }}
            ${{ steps.deployment-url.outputs.url }}/dashboard
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format Lighthouse Results
        id: format-results
        if: always()
        run: |
          echo "### 🔦 Lighthouse Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Score | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ steps.lighthouse.outputs.performance }} | ≥85 |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ${{ steps.lighthouse.outputs.accessibility }} | ≥90 |" >> $GITHUB_STEP_SUMMARY
          echo "| Best Practices | ${{ steps.lighthouse.outputs.best-practices }} | ≥90 |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO | ${{ steps.lighthouse.outputs.seo }} | ≥90 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [Full Report](${{ steps.lighthouse.outputs.links }})" >> $GITHUB_STEP_SUMMARY

      - name: Check Performance Thresholds
        if: always()
        run: |
          PERFORMANCE="${{ steps.lighthouse.outputs.performance }}"
          ACCESSIBILITY="${{ steps.lighthouse.outputs.accessibility }}"
          SEO="${{ steps.lighthouse.outputs.seo }}"
          
          # Remove decimals
          PERF_INT=${PERFORMANCE%.*}
          ACC_INT=${ACCESSIBILITY%.*}
          SEO_INT=${SEO%.*}
          
          FAILED=false
          
          if [[ $PERF_INT -lt 85 ]]; then
            echo "❌ Performance score ($PERFORMANCE) below threshold (85)"
            FAILED=true
          fi
          
          if [[ $ACC_INT -lt 90 ]]; then
            echo "❌ Accessibility score ($ACCESSIBILITY) below threshold (90)"
            FAILED=true
          fi
          
          if [[ $SEO_INT -lt 90 ]]; then
            echo "❌ SEO score ($SEO) below threshold (90)"
            FAILED=true
          fi
          
          if [[ "$FAILED" == "true" ]]; then
            echo "::warning::Performance benchmarks not met. See report for details."
          else
            echo "✅ All performance benchmarks passed!"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const performance = '${{ steps.lighthouse.outputs.performance }}';
            const accessibility = '${{ steps.lighthouse.outputs.accessibility }}';
            const bestPractices = '${{ steps.lighthouse.outputs.best-practices }}';
            const seo = '${{ steps.lighthouse.outputs.seo }}';
            const reportUrl = '${{ steps.lighthouse.outputs.links }}';
            
            const getEmoji = (score, threshold) => {
              const s = parseFloat(score);
              if (s >= threshold) return '✅';
              if (s >= threshold - 10) return '⚠️';
              return '❌';
            };
            
            const body = `## 🔦 Lighthouse Performance Report

            | Metric | Score | Status |
            |--------|-------|--------|
            | Performance | ${performance} | ${getEmoji(performance, 85)} |
            | Accessibility | ${accessibility} | ${getEmoji(accessibility, 90)} |
            | Best Practices | ${bestPractices} | ${getEmoji(bestPractices, 90)} |
            | SEO | ${seo} | ${getEmoji(seo, 90)} |

            🔗 [View Full Report](${reportUrl})

            <details>
            <summary>Benchmark Targets</summary>

            | Metric | Target | Good |
            |--------|--------|------|
            | LCP | < 2.5s | < 2.0s |
            | CLS | < 0.1 | < 0.05 |
            | Performance | ≥ 85 | ≥ 95 |
            | Accessibility | ≥ 90 | 100 |
            | SEO | ≥ 90 | 100 |

            </details>

            ---
            *Automated by Lighthouse CI*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Lighthouse Performance Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
